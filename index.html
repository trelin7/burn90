<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burn90">
<meta name="theme-color" content="#0a0a0a">

<title>Burn The Fat — 90 Day Plan</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a' rx='20'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🔥%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --surface: #141414;
  --card: #1e1e1e;
  --border: #2e2e2e;
  --white: #f0ebe0;
  --red: #e63222;
  --orange: #f5832a;
  --gold: #c9981a;
  --green: #3db864;
  --muted: #666;
  --text-secondary: #999;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
height: 100%;
background: var(–black);
color: var(–white);
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, sans-serif;
overscroll-behavior: none;
}

/* ── SCREENS ── */
.screen { display:none; flex-direction:column; height:100%; overflow:hidden; }
.screen.active { display:flex; }

/* ── HOME SCREEN ── */
#home {
background: var(–black);
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.home-hero {
padding: calc(var(–safe-top) + 48px) 24px 32px;
position: relative;
overflow: hidden;
border-bottom: 1px solid var(–border);
}
.home-hero::after {
content: ‘90’;
position: absolute;
right: -8px; top: 0;
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 220px;
color: rgba(230,50,34,0.05);
line-height:1;
pointer-events:none;
user-select:none;
}

.fire-badge {
display: inline-flex;
align-items: center;
gap: 6px;
font-family: ‘DM Mono’, ‘Courier New’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–red);
border: 1px solid var(–red);
padding: 4px 12px;
margin-bottom: 16px;
}

.hero-title {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 72px;
line-height: 0.88;
letter-spacing: 2px;
margin-bottom: 24px;
}
.hero-title span { color: var(–red); }

/* Progress ring */
.progress-row {
display: flex;
align-items: center;
gap: 20px;
margin-bottom: 24px;
}
.ring-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-center {
position:absolute; inset:0;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
}
.ring-pct { font-size:22px; color:var(–orange); line-height:1; }
.ring-label { font-size:9px; color:var(–muted); letter-spacing:1px; font-family:‘DM Mono’,‘Courier New’,monospace; }

.progress-meta { flex:1; }
.prog-line { display:flex; justify-content:space-between; margin-bottom:8px; }
.prog-key { font-family:‘DM Mono’,‘Courier New’,monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(–muted); }
.prog-val { font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif; font-size:22px; color:var(–orange); }

.streak-bar {
background: var(–surface);
border: 1px solid var(–border);
border-radius:4px;
padding:12px 16px;
display:flex;
justify-content:space-around;
}
.streak-item { text-align:center; }
.streak-num { font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif; font-size:28px; color:var(–red); }
.streak-lbl { font-family:‘DM Mono’,‘Courier New’,monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(–muted); }

/* Phase tabs */
.phase-tabs {
display:flex;
overflow-x:auto;
scrollbar-width:none;
padding: 0 16px;
gap:6px;
margin: 20px 0 0;
padding-bottom: 0;
}
.phase-tabs::-webkit-scrollbar { display:none; }

.ptab {
flex-shrink:0;
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
padding:8px 16px;
border:1px solid var(–border);
border-bottom:none;
background:transparent;
color:var(–muted);
cursor:pointer;
border-radius:4px 4px 0 0;
transition:all 0.15s;
}
.ptab.active { background:var(–surface); border-color:var(–red); color:var(–red); }

.phase-content { padding:0 16px 16px; background:var(–surface); }

/* Day cards */
.week-header {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:3px;
text-transform:uppercase;
color:var(–gold);
padding:16px 0 10px;
border-bottom:1px solid var(–border);
margin-bottom:10px;
}

.day-row {
display:flex;
align-items:center;
background:var(–card);
border:1px solid var(–border);
border-radius:6px;
margin-bottom:8px;
overflow:hidden;
cursor:pointer;
transition:border-color 0.15s;
-webkit-touch-callout:none;
user-select:none;
}
.day-row:active { opacity:0.8; }
.day-row.done { border-color: var(–green); }
.day-row.done .day-num { color: var(–green); }

.check-col {
width:44px;
display:flex;
align-items:center;
justify-content:center;
padding:14px 0;
flex-shrink:0;
}
.check-circle {
width:22px; height:22px;
border-radius:50%;
border:2px solid var(–border);
display:flex; align-items:center; justify-content:center;
transition:all 0.2s;
flex-shrink:0;
}
.day-row.done .check-circle {
background: var(–green);
border-color: var(–green);
}
.check-icon { display:none; }
.day-row.done .check-icon { display:block; }
.check-empty { display:block; }
.day-row.done .check-empty { display:none; }

.day-info { flex:1; padding:12px 8px 12px 0; min-width:0; }
.day-num {
font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif;
font-size:11px;
color:var(–red);
letter-spacing:2px;
line-height:1;
margin-bottom:3px;
}
.day-title {
font-size:13px;
font-weight:500;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.day-subtitle {
font-size:11px;
color:var(–text-secondary);
margin-top:2px;
font-family:‘DM Mono’,‘Courier New’,monospace;
letter-spacing:0.5px;
}

.arrow-col {
padding:0 12px;
color:var(–muted);
font-size:16px;
flex-shrink:0;
}

/* ── DETAIL SCREEN ── */
#detail {
background:var(–black);
display:none;
flex-direction:column;
}
#detail.active { display:flex; }

.detail-header {
padding: calc(var(–safe-top) + 12px) 16px 12px;
border-bottom:1px solid var(–border);
display:flex;
align-items:center;
gap:12px;
flex-shrink:0;
background:var(–black);
}
.back-btn {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:11px;
letter-spacing:1px;
color:var(–red);
background:none;
border:none;
cursor:pointer;
padding:8px 0;
display:flex;
align-items:center;
gap:6px;
}
.detail-day-label {
font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif;
font-size:28px;
color:var(–red);
line-height:1;
}
.detail-title-col { flex:1; min-width:0; }
.detail-title { font-weight:600; font-size:15px; }
.detail-phase { font-family:‘DM Mono’,‘Courier New’,monospace; font-size:10px; color:var(–muted); letter-spacing:1px; margin-top:2px; }

.detail-scroll {
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding:16px;
}

.done-banner {
background: rgba(61,184,100,0.12);
border:1px solid var(–green);
border-radius:6px;
padding:12px 16px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:16px;
font-size:13px;
color:var(–green);
font-weight:500;
}

.section-block { margin-bottom:20px; }
.section-label {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:var(–muted);
margin-bottom:8px;
}
.exercise-item {
display:flex;
justify-content:space-between;
align-items:center;
background:var(–card);
border:1px solid var(–border);
border-radius:4px;
padding:10px 12px;
margin-bottom:6px;
}
.ex-name { font-size:13px; }
.ex-detail { font-family:‘DM Mono’,‘Courier New’,monospace; font-size:11px; color:var(–orange); }

.rules-block {
background:var(–surface);
border-left:3px solid var(–red);
border-radius:0 4px 4px 0;
padding:14px 16px;
margin-bottom:20px;
}
.rules-title {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:var(–red);
margin-bottom:10px;
}
.rule-item {
font-size:12px;
color:#ccc;
padding:4px 0 4px 16px;
position:relative;
line-height:1.4;
}
.rule-item::before { content:‘→’; position:absolute; left:0; color:var(–orange); font-family:‘DM Mono’,‘Courier New’,monospace; }

/* 75 Hard checklist */
.hard-checklist { margin-bottom:20px; }
.hcl-title {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:var(–gold);
margin-bottom:10px;
}
.hcl-item {
display:flex;
align-items:center;
gap:12px;
background:var(–card);
border:1px solid var(–border);
border-radius:4px;
padding:12px 14px;
margin-bottom:6px;
cursor:pointer;
transition:border-color 0.15s;
-webkit-touch-callout:none;
user-select:none;
}
.hcl-item:active { opacity:0.75; }
.hcl-item.checked { border-color:var(–green); }
.hcl-item.checked .hcl-box { background:var(–green); border-color:var(–green); }
.hcl-box {
width:20px; height:20px;
border-radius:4px;
border:2px solid var(–border);
display:flex; align-items:center; justify-content:center;
flex-shrink:0;
transition:all 0.2s;
font-size:11px;
}
.hcl-text { font-size:13px; line-height:1.3; }

.complete-btn {
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
padding:16px;
background:var(–red);
color:var(–white);
border:none;
border-radius:6px;
font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif;
font-size:22px;
letter-spacing:2px;
cursor:pointer;
margin-top:8px;
transition:all 0.2s;
}
.complete-btn:active { transform:scale(0.98); opacity:0.9; }
.complete-btn.done-state { background: #1a3d26; color:var(–green); }

.copy-cal-btn {
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:100%;
padding:13px;
background:transparent;
color:var(–muted);
border:1px solid var(–border);
border-radius:6px;
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
margin-top:8px;
transition:all 0.2s;
}
.copy-cal-btn:active { background:var(–surface); }
.copy-cal-btn.copied { color:var(–green); border-color:var(–green); }

/* ── BOTTOM NAV ── */
.bottom-nav {
display:flex;
background:var(–surface);
border-top:1px solid var(–border);
padding: 8px 0 calc(var(–safe-bottom) + 8px);
flex-shrink:0;
}
.nav-btn {
flex:1;
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
background:none;
border:none;
color:var(–muted);
cursor:pointer;
padding:6px 0;
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:9px;
letter-spacing:1px;
text-transform:uppercase;
transition:color 0.15s;
}
.nav-btn.active { color:var(–red); }
.nav-icon { font-size:18px; }

/* ── STATS SCREEN ── */
#stats {
background:var(–black);
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}
.stats-pad {
padding: calc(var(–safe-top) + 48px) 20px 20px;
}
.stats-hero-title {
font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif;
font-size:48px;
letter-spacing:2px;
margin-bottom:24px;
border-bottom:1px solid var(–border);
padding-bottom:16px;
}

.stat-card {
background:var(–card);
border:1px solid var(–border);
border-radius:6px;
padding:20px;
margin-bottom:12px;
}
.stat-card-label {
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:10px;
letter-spacing:2px;
text-transform:uppercase;
color:var(–muted);
margin-bottom:8px;
}
.stat-card-val {
font-family:‘Bebas Neue’,‘Arial Narrow’,Arial,sans-serif;
font-size:48px;
color:var(–orange);
line-height:1;
}
.stat-card-sub { font-size:12px; color:var(–text-secondary); margin-top:4px; }

.week-progress {
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin-top:12px;
}
.wp-cell {
aspect-ratio:1;
border-radius:3px;
background:var(–border);
display:flex;
align-items:center;
justify-content:center;
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:8px;
color:var(–muted);
}
.wp-cell.done { background:var(–green); color:#fff; }
.wp-cell.today { outline:2px solid var(–orange); }

/* ── TOAST ── */
.toast {
position:fixed;
bottom:calc(var(–safe-bottom) + 80px);
left:50%;
transform:translateX(-50%) translateY(20px);
background:var(–green);
color:#fff;
padding:10px 20px;
border-radius:20px;
font-family:‘DM Mono’,‘Courier New’,monospace;
font-size:12px;
letter-spacing:1px;
opacity:0;
pointer-events:none;
z-index:999;
white-space:nowrap;
transition:all 0.3s;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* scrollbars */
::-webkit-scrollbar { width:0; }
</style>

</head>

<script>
// ── STATE ────────────────────────────────────────────────────────
let completedDays = {};
let hardChecks = {}; // { "day_16": { w1:true, w2:true, water:false, ... } }
let currentPhaseTab = 0;
let currentDayIndex = null;

const STORAGE_KEY = 'burn90_completed';
const CHECKS_KEY  = 'burn90_checks';

function load() {
  try {
    completedDays = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    hardChecks    = JSON.parse(localStorage.getItem(CHECKS_KEY)  || '{}');
  } catch(e) { completedDays = {}; hardChecks = {}; }
}
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completedDays));
    localStorage.setItem(CHECKS_KEY,  JSON.stringify(hardChecks));
  } catch(e) {}
}

  { day:3,  title:'Upper Body — Push & Pull', phase:'RAMP PHASE', outdoor:false,

  { day:4,  title:'Active Recovery — Outdoor Walk', phase:'RAMP PHASE', outdoor:true,

  { day:5,  title:'Lower Body — Squat & Hinge', phase:'RAMP PHASE', outdoor:false,

  { day:6,  title:'Cardio — Zone 2 Steady State', phase:'RAMP PHASE', outdoor:false,

// Build phase 2 days
const PHASE2A = [];
for (let i = 0; i < 30; i++) {
  const day = 16 + i;
  const gym = GYM_TEMPLATES_A[i % GYM_TEMPLATES_A.length];
  PHASE2A.push({
    day, title: gym.title, phase:'75 HARD — PHASE 2A', outdoor:true,
    gym, outdoorDesc: OUTDOOR_A[i % OUTDOOR_A.length],
    sections: gym.sections
  });
}

const PHASE2B = [];
for (let i = 0; i < 45; i++) {
  const day = 46 + i;
  const gym = GYM_TEMPLATES_B[i % GYM_TEMPLATES_B.length];
  PHASE2B.push({
    day, title: gym.title, phase:'75 HARD — PHASE 2B', outdoor:true,
    gym, outdoorDesc: OUTDOOR_B[i % OUTDOOR_B.length],
    sections: gym.sections
  });
}

const ALL_DAYS = [...PHASE1, ...PHASE2A, ...PHASE2B];

const HARD_ITEMS = [
  {key:'w1',   label:'Workout 1 complete (45+ min gym)'},
  {key:'w2',   label:'Workout 2 complete — OUTDOORS (45+ min)'},
  {key:'water',label:'1 gallon (128oz) of water consumed'},
  {key:'diet', label:'Diet followed — no cheats, no alcohol'},
  {key:'read', label:'10 pages of non-fiction read'},
  {key:'photo',label:'Daily progress photo taken'},
];

// ── RENDER HOME ──────────────────────────────────────────────────
function renderPhase(phaseIndex) {
  currentPhaseTab = phaseIndex;
  const content = document.getElementById('phaseContent');
  content.innerHTML = '';

  let days, weeks;
  if (phaseIndex === 0) {
    days = PHASE1;
    weeks = [{label:'Week 1 — Days 1–7', start:0, end:7},{label:'Week 2 — Days 8–15', start:7, end:15}];
  } else if (phaseIndex === 1) {
    days = PHASE2A;
    weeks = [
      {label:'Days 16–22', start:0,  end:7},
      {label:'Days 23–29', start:7,  end:14},
      {label:'Days 30–36', start:14, end:21},
      {label:'Days 37–45', start:21, end:30},
    ];
  } else {
    days = PHASE2B;
    weeks = [
      {label:'Days 46–52', start:0,  end:7},
      {label:'Days 53–59', start:7,  end:14},
      {label:'Days 60–66', start:14, end:21},
      {label:'Days 67–73', start:21, end:28},
      {label:'Days 74–82', start:28, end:37},
      {label:'Days 83–90 — FINAL PUSH', start:37, end:45},
    ];
  }

  weeks.forEach(w => {
    const wh = document.createElement('div');
    wh.className = 'week-header';
    wh.textContent = w.label;
    content.appendChild(wh);

    days.slice(w.start, w.end).forEach((d, i) => {
      const globalIdx = ALL_DAYS.findIndex(x => x.day === d.day);
      const done = !!completedDays[d.day];
      const row = document.createElement('div');
      row.className = 'day-row' + (done ? ' done' : '');
      row.onclick = () => openDay(globalIdx);
      row.innerHTML = `
        <div class="check-col">
          <div class="check-circle">
            <span class="check-icon">✓</span>
            <span class="check-empty"></span>
          </div>
        </div>
        <div class="day-info">
          <div class="day-num">DAY ${d.day}</div>
          <div class="day-title">${d.title}</div>
          <div class="day-subtitle">${d.phase}${d.outdoor ? ' · 🌿 OUTDOOR' : ''}</div>
        </div>
        <div class="arrow-col">›</div>`;
      content.appendChild(row);
    });
  });
}

function switchPhase(idx) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', +t.dataset.phase === idx));
  renderPhase(idx);
}

// ── OPEN DAY ────────────────────────────────────────────────────
function openDay(globalIdx) {
  currentDayIndex = globalIdx;
  const d = ALL_DAYS[globalIdx];
  const done = !!completedDays[d.day];
  const isHard = d.day >= 16;

  document.getElementById('detailDayNum').textContent = 'D' + d.day;
  document.getElementById('detailTitle').textContent = d.title;
  document.getElementById('detailPhase').textContent = d.phase;

  const scroll = document.getElementById('detailScroll');
  scroll.innerHTML = '';

  // Done banner
  if (done) {
    scroll.innerHTML += `<div class="done-banner">✅ Day ${d.day} complete! Keep going.</div>`;
  }

  // 75 Hard checklist
  if (isHard) {
    const key = 'day_' + d.day;
    const checks = hardChecks[key] || {};
    let clHTML = `<div class="hard-checklist"><div class="hcl-title">75 Hard Daily Checklist</div>`;
    HARD_ITEMS.forEach(item => {
      const chk = !!checks[item.key];
      clHTML += `<div class="hcl-item${chk ? ' checked' : ''}" onclick="toggleCheck(${d.day},'${item.key}',this)">
        <div class="hcl-box">${chk ? '✓' : ''}</div>
        <div class="hcl-text">${item.label}</div>
      </div>`;
    });
    clHTML += `</div>`;
    scroll.innerHTML += clHTML;

    // Outdoor session
    if (d.outdoorDesc) {
      scroll.innerHTML += `<div class="section-block">
        <div class="section-label">🌿 Outdoor Workout (Workout 2)</div>
        <div class="exercise-item"><span class="ex-name">${d.outdoorDesc}</span></div>
      </div>`;
    }
  } else {
    // Phase 1 rules reminder
    scroll.innerHTML += `<div class="rules-block">
      <div class="rules-title">Phase 1 Guidelines</div>
      <div class="rule-item">1 workout today, 45–60 minutes</div>
      <div class="rule-item">Focus on form, not weight</div>
      <div class="rule-item">Drink 80+ oz water today</div>
      <div class="rule-item">Target 2,000–2,200 calories</div>
    </div>`;
  }

  // Workout sections
  d.sections.forEach(s => {
    let sHTML = `<div class="section-block"><div class="section-label">${s.label}</div>`;
    (s.ex || s.exercises || []).forEach(e => {
      sHTML += `<div class="exercise-item"><span class="ex-name">${e.n || e.name}</span><span class="ex-detail">${e.d || e.detail}</span></div>`;
    });
    sHTML += '</div>';
    scroll.innerHTML += sHTML;
  });

  // Mark Complete button
  scroll.innerHTML += `<button class="complete-btn${done ? ' done-state' : ''}" id="completeBtn" onclick="toggleComplete(${d.day})">
    ${done ? '✓ DAY COMPLETE' : '✓ MARK DAY COMPLETE'}
  </button>`;

  // Copy for calendar
  const calText = buildCalText(d);
  scroll.innerHTML += `<button class="copy-cal-btn" id="copyCalBtn" onclick="copyCal(this, \`${calText.replace(/`/g,'\\`')}\`)">📋 Copy to Calendar</button>`;
  scroll.innerHTML += '<div style="height:40px"></div>';

  showScreen('detail');
}

function toggleCheck(day, itemKey, el) {
  const key = 'day_' + day;
  if (!hardChecks[key]) hardChecks[key] = {};
  hardChecks[key][itemKey] = !hardChecks[key][itemKey];
  save();
  el.classList.toggle('checked', hardChecks[key][itemKey]);
  el.querySelector('.hcl-box').textContent = hardChecks[key][itemKey] ? '✓' : '';

  // Auto-complete day if all 6 checked
  const allDone = HARD_ITEMS.every(i => hardChecks[key][i.key]);
  if (allDone && !completedDays[day]) {
    completedDays[day] = true;
    save();
    updateCompleteBtn(true);
    showToast('🔥 All tasks done — Day ' + day + ' complete!');
    updateProgress();
  }
}

function toggleComplete(day) {
  completedDays[day] = !completedDays[day];
  save();
  const done = completedDays[day];
  updateCompleteBtn(done);
  if (done) showToast('🔥 Day ' + day + ' marked complete!');
  updateProgress();
  // Update banner
  const scroll = document.getElementById('detailScroll');
  const existing = scroll.querySelector('.done-banner');
  if (done && !existing) {
    scroll.insertAdjacentHTML('afterbegin', `<div class="done-banner">✅ Day ${day} complete! Keep going.</div>`);
  } else if (!done && existing) {
    existing.remove();
  }
}

function updateCompleteBtn(done) {
  const btn = document.getElementById('completeBtn');
  if (btn) {
    btn.textContent = done ? '✓ DAY COMPLETE' : '✓ MARK DAY COMPLETE';
    btn.classList.toggle('done-state', done);
  }
}

function copyCal(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    showToast('Copied! Paste into iOS Calendar notes.');
    setTimeout(() => { btn.textContent = '📋 Copy to Calendar'; btn.classList.remove('copied'); }, 2500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy to Calendar'; }, 2500);
  });
}

function buildCalText(d) {
  const isHard = d.day >= 16;
  let t = `🔥 Day ${d.day} — ${d.title}\n`;
  t += `📍 ${d.phase}\n\n`;
  if (isHard) {
    t += `75 HARD CHECKLIST:\n☐ Workout 1 (45+ min gym)\n☐ Workout 2 OUTDOORS (45+ min)\n☐ 1 gallon water\n☐ Diet — no cheats, no alcohol\n☐ 10 pages read\n☐ Progress photo\n\n`;
    if (d.outdoorDesc) t += `🌿 OUTDOOR: ${d.outdoorDesc}\n\n`;
  }
  t += `🏋️ GYM WORKOUT:\n`;
  d.sections.forEach(s => {
    t += `${s.label}:\n`;
    (s.ex || s.exercises || []).forEach(e => { t += `• ${e.n||e.name}: ${e.d||e.detail}\n`; });
    t += '\n';
  });
  if (!isHard) t += `💧 Water: 80+ oz | 🥗 Calories: 2,000–2,200`;
  return t;
}

// ── PROGRESS ────────────────────────────────────────────────────
function updateProgress() {
  const total = 90;
  const done = Object.keys(completedDays).filter(k => completedDays[k]).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('doneCount').textContent = done + ' / ' + total;
  document.getElementById('ringPct').textContent = pct + '%';

  const circumference = 213.6;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('ringCircle').style.strokeDashoffset = offset;

  // Streak calc
  let streak = 0;
  for (let i = 1; i <= 90; i++) {
    if (completedDays[i]) streak++;
    else if (i <= done + 1) { streak = completedDays[i] ? streak : 0; }
  }
  // simpler streak: consecutive from day 1
  streak = 0;
  for (let i = 1; i <= 90; i++) {
    if (completedDays[i]) streak++;
    else break;
  }
  document.getElementById('streakCount').textContent = streak + ' 🔥';

  const phase = done < 15 ? 'RAMP' : done < 45 ? '75 HARD 2A' : '75 HARD 2B';
  document.getElementById('currentPhase').textContent = phase;

  renderStats(done, streak, pct);
}

function renderStats(done, streak, pct) {
  const sc = document.getElementById('statsContent');
  const remaining = 90 - done;
  const lbsLost = (done * (40/90)).toFixed(1);
  const targetLbs = (230 - parseFloat(lbsLost)).toFixed(0);

  sc.innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">Days Completed</div>
      <div class="stat-card-val">${done}</div>
      <div class="stat-card-sub">${remaining} days remaining in the program</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Current Streak</div>
      <div class="stat-card-val">${streak} 🔥</div>
      <div class="stat-card-sub">Consecutive days completed from Day 1</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Estimated Progress</div>
      <div class="stat-card-val">~${lbsLost} lbs</div>
      <div class="stat-card-sub">Estimated lost → ~${targetLbs} lbs current (based on pace)</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Completion</div>
      <div class="stat-card-val">${pct}%</div>
      <div style="background:var(--border);border-radius:4px;height:6px;margin-top:12px;overflow:hidden;">
        <div style="background:var(--orange);height:6px;width:${pct}%;border-radius:4px;transition:width 0.4s;"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">90-Day Calendar</div>
      <div class="week-progress" id="calGrid"></div>
    </div>`;

  // Calendar grid
  const grid = document.getElementById('calGrid');
  for (let i = 1; i <= 90; i++) {
    const cell = document.createElement('div');
    cell.className = 'wp-cell' + (completedDays[i] ? ' done' : '');
    cell.textContent = i;
    grid.appendChild(cell);
  }
}

// ── NAVIGATION ──────────────────────────────────────────────────
let previousScreen = 'home';

function showScreen(id) {
  if (id !== 'detail') previousScreen = id;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // update nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick') && b.getAttribute('onclick').includes(id));
  });
  if (id !== 'detail') window.scrollTo(0,0);
}

function goBack() {
  showScreen(previousScreen);
  renderPhase(currentPhaseTab);
  updateProgress();
}

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ─────────────────────────────────────────────────────────
load();
renderPhase(0);
updateProgress();
</script>
