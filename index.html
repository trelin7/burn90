<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burn90">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark">
<title>Burn90</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#0a0a0a;color-scheme:dark}
body{background:#0a0a0a!important;color:#f0ebe0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-text-size-adjust:100%}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
/* FONTS - system condensed bold for headings */
.font-display{font-family:'Arial Narrow',Arial,sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.font-mono{font-family:'Courier New',Courier,monospace;letter-spacing:1px}

/* HOME */
#home{background:#0a0a0a;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.home-hero{padding:calc(env(safe-area-inset-top,0px) + 48px) 24px 28px;border-bottom:1px solid #2e2e2e;position:relative;overflow:hidden}
.home-hero::after{content:‘90’;position:absolute;right:-10px;top:-10px;font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:200px;color:rgba(230,50,34,0.06);line-height:1;pointer-events:none;user-select:none}
.fire-badge{display:inline-flex;align-items:center;gap:6px;font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#e63222;border:1px solid #e63222;padding:4px 12px;margin-bottom:16px}
.hero-title{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:80px;line-height:0.88;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;color:#f0ebe0}
.hero-title span{color:#e63222}
.progress-row{display:flex;align-items:center;gap:20px;margin-bottom:0}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:22px;color:#f5832a;line-height:1}
.ring-lbl{font-family:‘Courier New’,monospace;font-size:9px;color:#666;letter-spacing:1px;text-transform:uppercase}
.progress-meta{flex:1}
.prog-line{display:flex;justify-content:space-between;margin-bottom:8px;align-items:baseline}
.prog-key{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666}
.prog-val{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:24px;color:#f5832a}
/* Phase tabs */
.phase-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:16px 16px 0;gap:6px;background:#0a0a0a}
.phase-tabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border:1px solid #2e2e2e;border-bottom:none;background:transparent;color:#666;cursor:pointer;border-radius:4px 4px 0 0;transition:all 0.15s}
.ptab.active{background:#141414;border-color:#e63222;color:#e63222}
.phase-content{padding:0 16px 16px;background:#141414;min-height:200px}
.week-header{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c9981a;padding:16px 0 10px;border-bottom:1px solid #2e2e2e;margin-bottom:10px}
/* Day rows */
.day-row{display:flex;align-items:center;background:#1e1e1e;border:1px solid #2e2e2e;border-radius:6px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;user-select:none}
.day-row:active{opacity:0.75}
.day-row.done{border-color:#3db864}
.check-col{width:44px;display:flex;align-items:center;justify-content:center;padding:14px 0;flex-shrink:0}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid #2e2e2e;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:12px;color:transparent}
.day-row.done .check-circle{background:#3db864;border-color:#3db864;color:#fff}
.day-info{flex:1;padding:12px 8px 12px 0;min-width:0}
.day-num{font-family:‘Courier New’,monospace;font-size:10px;color:#e63222;letter-spacing:2px;line-height:1;margin-bottom:3px;text-transform:uppercase}
.day-row.done .day-num{color:#3db864}
.day-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f0ebe0}
.day-sub{font-size:11px;color:#666;margin-top:2px;font-family:‘Courier New’,monospace;letter-spacing:0.5px}
.arrow-col{padding:0 12px;color:#444;font-size:18px;flex-shrink:0}
/* DETAIL */
#detail{background:#0a0a0a;display:none;flex-direction:column;min-height:100vh}
#detail.active{display:flex}
.detail-header{padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;gap:12px;flex-shrink:0;background:#0a0a0a;position:sticky;top:0;z-index:10}
.back-btn{font-family:‘Courier New’,monospace;font-size:11px;letter-spacing:1px;color:#e63222;background:none;border:none;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px;text-transform:uppercase}
.detail-day-num{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:32px;color:#e63222;line-height:1}
.detail-title-col{flex:1;min-width:0}
.detail-title{font-weight:700;font-size:15px;color:#f0ebe0}
.detail-phase{font-family:‘Courier New’,monospace;font-size:10px;color:#666;letter-spacing:1px;margin-top:2px;text-transform:uppercase}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.done-banner{background:rgba(61,184,100,0.12);border:1px solid #3db864;border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px;color:#3db864;font-weight:600}
.section-block{margin-bottom:20px}
.section-label{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:8px}
.exercise-item{display:flex;justify-content:space-between;align-items:center;background:#1e1e1e;border:1px solid #2e2e2e;border-radius:4px;padding:10px 12px;margin-bottom:6px}
.ex-name{font-size:13px;color:#f0ebe0}
.ex-detail{font-family:‘Courier New’,monospace;font-size:11px;color:#f5832a;flex-shrink:0;margin-left:8px;text-align:right}
.rules-block{background:#141414;border-left:3px solid #e63222;border-radius:0 4px 4px 0;padding:14px 16px;margin-bottom:20px}
.rules-title{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#e63222;margin-bottom:10px}
.rule-item{font-size:12px;color:#ccc;padding:4px 0 4px 16px;position:relative;line-height:1.4}
.rule-item::before{content:‘→’;position:absolute;left:0;color:#f5832a;font-family:‘Courier New’,monospace}
.hard-checklist{margin-bottom:20px}
.hcl-title{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c9981a;margin-bottom:10px}
.hcl-item{display:flex;align-items:center;gap:12px;background:#1e1e1e;border:1px solid #2e2e2e;border-radius:4px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s;user-select:none}
.hcl-item:active{opacity:0.75}
.hcl-item.checked{border-color:#3db864}
.hcl-item.checked .hcl-box{background:#3db864;border-color:#3db864;color:#fff}
.hcl-box{width:20px;height:20px;border-radius:4px;border:2px solid #2e2e2e;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:12px;color:transparent}
.hcl-text{font-size:13px;line-height:1.3;color:#f0ebe0}
.complete-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:#e63222;color:#f0ebe0;border:none;border-radius:6px;font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all 0.2s}
.complete-btn:active{transform:scale(0.98);opacity:0.9}
.complete-btn.done-state{background:#1a3d26;color:#3db864}
.copy-cal-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:transparent;color:#666;border:1px solid #2e2e2e;border-radius:6px;font-family:‘Courier New’,monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all 0.2s}
.copy-cal-btn.copied{color:#3db864;border-color:#3db864}
/* STATS */
#stats{background:#0a0a0a;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.stats-pad{padding:calc(env(safe-area-inset-top,0px) + 48px) 20px 100px}
.stats-title{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:48px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;border-bottom:1px solid #2e2e2e;padding-bottom:16px;color:#f0ebe0}
.stat-card{background:#1e1e1e;border:1px solid #2e2e2e;border-radius:6px;padding:20px;margin-bottom:12px}
.stat-card-label{font-family:‘Courier New’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:8px}
.stat-card-val{font-family:‘Arial Narrow’,Arial,sans-serif;font-weight:900;font-size:48px;color:#f5832a;line-height:1}
.stat-card-sub{font-size:12px;color:#666;margin-top:4px}
.cal-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-top:12px}
.cal-cell{aspect-ratio:1;border-radius:2px;background:#2e2e2e;display:flex;align-items:center;justify-content:center;font-family:‘Courier New’,monospace;font-size:7px;color:#444}
.cal-cell.done{background:#3db864;color:#fff}
/* BOTTOM NAV */
.bottom-nav{display:flex;background:#141414;border-top:1px solid #2e2e2e;padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);flex-shrink:0;position:sticky;bottom:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#444;cursor:pointer;padding:6px 0;font-family:‘Courier New’,monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;transition:color 0.15s}
.nav-btn.active{color:#e63222}
.nav-icon{font-size:20px}
/* TOAST */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 80px);left:50%;transform:translateX(-50%) translateY(20px);background:#3db864;color:#fff;padding:10px 20px;border-radius:20px;font-family:‘Courier New’,monospace;font-size:12px;letter-spacing:1px;opacity:0;pointer-events:none;z-index:999;white-space:nowrap;transition:all 0.3s;font-weight:600}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:0}
</style>

</head>
<body>

<!-- HOME -->

<div class="screen active" id="home">
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#0a0a0a">
    <div class="home-hero">
      <div class="fire-badge">🔥 90-Day Fat Loss Protocol</div>
      <div class="hero-title">BURN<br><span>THE</span><br>FAT</div>
      <div class="progress-row">
        <div class="ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#2e2e2e" stroke-width="7"/>
            <circle id="ringCircle" cx="40" cy="40" r="34" fill="none" stroke="#f5832a" stroke-width="7"
              stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ringPct">0%</div>
            <div class="ring-lbl">done</div>
          </div>
        </div>
        <div class="progress-meta">
          <div class="prog-line"><span class="prog-key">Completed</span><span class="prog-val" id="doneCount">0/90</span></div>
          <div class="prog-line"><span class="prog-key">Streak</span><span class="prog-val" id="streakCount">0🔥</span></div>
          <div class="prog-line"><span class="prog-key">Phase</span><span class="prog-val" id="currentPhase">RAMP</span></div>
        </div>
      </div>
    </div>
    <div class="phase-tabs" id="phaseTabs">
      <button class="ptab active" data-phase="0" onclick="switchPhase(0)">Phase 1 — Ramp</button>
      <button class="ptab" data-phase="1" onclick="switchPhase(1)">Phase 2A — 75 Hard</button>
      <button class="ptab" data-phase="2" onclick="switchPhase(2)">Phase 2B — 75 Hard</button>
    </div>
    <div class="phase-content" id="phaseContent"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('home',this)"><span class="nav-icon">🏠</span>Plan</button>
    <button class="nav-btn" onclick="showScreen('stats',this)"><span class="nav-icon">📊</span>Stats</button>
  </div>
</div>

<!-- DETAIL -->

<div class="screen" id="detail">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">‹ Back</button>
    <div class="detail-day-num" id="detailDayNum">D1</div>
    <div class="detail-title-col">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-phase" id="detailPhase"></div>
    </div>
  </div>
  <div class="detail-scroll" id="detailScroll"></div>
</div>

<!-- STATS -->

<div class="screen" id="stats">
  <div class="stats-pad" style="flex:1">
    <div class="stats-title">Your Progress</div>
    <div id="statsContent"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('home',this)"><span class="nav-icon">🏠</span>Plan</button>
    <button class="nav-btn active" onclick="showScreen('stats',this)"><span class="nav-icon">📊</span>Stats</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let completedDays={},hardChecks={},currentPhaseTab=0,currentDayIndex=null,prevScreen='home';
try{completedDays=JSON.parse(localStorage.getItem('b90_done')||'{}');hardChecks=JSON.parse(localStorage.getItem('b90_chk')||'{}');}catch(e){}
function save(){try{localStorage.setItem('b90_done',JSON.stringify(completedDays));localStorage.setItem('b90_chk',JSON.stringify(hardChecks));}catch(e){}}

const PHASE1=[
  {day:1,title:'Full Body — Movement Primer',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Warm-Up (10 min)',ex:[{n:'Treadmill walk',d:'10 min @ 3.0 mph'},{n:'Hip circles & arm swings',d:'2 min'}]},
    {label:'Strength Circuit — 3 rounds',ex:[{n:'Goblet squat',d:'3×12 @ 25 lb'},{n:'Push-ups (knees ok)',d:'3×10'},{n:'Seated cable row',d:'3×12 @ 40 lb'},{n:'Plank hold',d:'3×20 sec'}]},
    {label:'Cardio Finisher',ex:[{n:'Elliptical',d:'15 min, low resistance'}]}]},
  {day:2,title:'Outdoor Walk + Core',phase:'RAMP PHASE',outdoor:true,sections:[
    {label:'Outdoor Walk',ex:[{n:'Brisk walk outdoors',d:'30 min, hilly if possible'}]},
    {label:'Core Work — 15 min',ex:[{n:'Dead bug',d:'3×10 each side'},{n:'Bird dog',d:'3×10 each side'},{n:'Side plank',d:'2×20 sec each'},{n:'Glute bridge',d:'3×15'}]}]},
  {day:3,title:'Upper Body — Push & Pull',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Warm-Up',ex:[{n:'Rowing machine',d:'5 min easy'},{n:'Band pull-aparts',d:'3×15'}]},
    {label:'Push — 3 sets',ex:[{n:'DB chest press',d:'3×12 @ 30 lb/hand'},{n:'DB shoulder press',d:'3×10 @ 20 lb/hand'},{n:'Tricep pushdown',d:'3×12 @ 30 lb'}]},
    {label:'Pull — 3 sets',ex:[{n:'Lat pulldown',d:'3×12 @ 60 lb'},{n:'DB bent-over row',d:'3×12 @ 30 lb/hand'},{n:'Face pulls',d:'3×15 @ 20 lb'}]}]},
  {day:4,title:'Active Recovery — Outdoor Walk',phase:'RAMP PHASE',outdoor:true,sections:[
    {label:'Recovery Walk',ex:[{n:'Easy pace outdoors',d:'45 min'},{n:'Light stretching at halfway',d:'5 min'}]}]},
  {day:5,title:'Lower Body — Squat & Hinge',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Warm-Up',ex:[{n:'Bike or walk',d:'5 min easy'},{n:'Bodyweight squats',d:'2×15'}]},
    {label:'Squat',ex:[{n:'Leg press',d:'3×15 moderate'},{n:'Goblet squat',d:'3×12 @ 35 lb'},{n:'Leg extension',d:'3×15 moderate'}]},
    {label:'Hinge',ex:[{n:'Romanian deadlift (DB)',d:'3×12 @ 30 lb/hand'},{n:'Leg curl',d:'3×15 moderate'},{n:'Standing calf raise',d:'3×20'}]}]},
  {day:6,title:'Cardio — Zone 2 Steady State',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Cardio — 45 min',ex:[{n:'Treadmill incline walk OR bike',d:'45 min zone 2'},{n:'Target HR',d:'110–130 bpm'}]}]},
  {day:7,title:'Rest Day',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Recovery',ex:[{n:'Full rest or 20-min walk',d:'Optional'},{n:'Foam roll / stretch',d:'15–20 min'},{n:'Meal prep for week',d:'Recommended'}]}]},
  {day:8,title:'Full Body — Increase Volume',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Warm-Up',ex:[{n:'Treadmill walk/jog',d:'8 min'},{n:'Dynamic stretches',d:'2 min'}]},
    {label:'Strength — 4 rounds',ex:[{n:'Barbell back squat',d:'4×10 @ 65 lb'},{n:'DB row',d:'4×12 @ 35 lb/hand'},{n:'Incline push-up',d:'4×12'},{n:'Hip thrust',d:'4×15 BW'}]},
    {label:'Cardio Finisher',ex:[{n:'Rowing machine',d:'15 min moderate'}]}]},
  {day:9,title:'Outdoor Walk/Jog Intervals',phase:'RAMP PHASE',outdoor:true,sections:[
    {label:'Outdoor Intervals — 45 min',ex:[{n:'2 min walk / 1 min jog',d:'Repeat 12–15 rounds'},{n:'Cool-down walk',d:'5 min'}]}]},
  {day:10,title:'Upper Body — Heavy Push/Pull',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Push',ex:[{n:'Barbell bench press',d:'4×8 @ 95 lb'},{n:'DB lateral raise',d:'3×15 @ 15 lb'},{n:'Tricep dip',d:'3×10'}]},
    {label:'Pull',ex:[{n:'Pull-up / lat pulldown',d:'4×10'},{n:'Cable row',d:'4×12 @ 60 lb'},{n:'Bicep curl',d:'3×12 @ 25 lb'}]}]},
  {day:11,title:'HIIT Intro — Short Intervals',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'HIIT Circuit — 30 min',ex:[{n:'Jump rope / jumping jacks',d:'30 sec on/off × 10'},{n:'Box step-ups',d:'3×20 (10 each leg)'},{n:'Battle rope / rowing sprint',d:'20 sec on / 40 sec off × 8'}]},
    {label:'Cool-Down',ex:[{n:'Stretch & foam roll',d:'10 min'}]}]},
  {day:12,title:'Lower Body — Volume',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Compound',ex:[{n:'Barbell squat',d:'4×10 @ 75 lb'},{n:'Romanian deadlift',d:'4×10 @ 95 lb'}]},
    {label:'Accessory',ex:[{n:'Walking lunges',d:'3×20 steps BW'},{n:'Leg press',d:'3×15 moderate'},{n:'Calf raise',d:'4×20'}]}]},
  {day:13,title:'Long Outdoor Walk',phase:'RAMP PHASE',outdoor:true,sections:[
    {label:'Outdoor Walk — 45–60 min',ex:[{n:'Steady brisk walk',d:'45–60 min any terrain'},{n:'No phone, just move',d:'Mental recovery'}]}]},
  {day:14,title:'Full Body — Week 2 Finale',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Strength — 4 rounds',ex:[{n:'Squat',d:'4×10 @ 80 lb'},{n:'Push-up (standard)',d:'4×15'},{n:'DB row',d:'4×12 @ 40 lb'},{n:'Plank',d:'4×30 sec'}]},
    {label:'Cardio Finisher',ex:[{n:'Treadmill incline / bike',d:'20 min moderate'}]}]},
  {day:15,title:'Rest + Prepare for 75 Hard',phase:'RAMP PHASE',outdoor:false,sections:[
    {label:'Prepare',ex:[{n:'Rest or light 20-min walk',d:'Optional'},{n:'Plan your strict diet',d:'Write it down'},{n:'Buy a gallon water jug',d:'You will need it'},{n:'Set two daily workout slots',d:'Morning + Evening'},{n:'Pick your non-fiction book',d:'10 pages/day'}]}]}
];

const GYM_A=[
  {title:'Upper Strength',sections:[{label:'Press',ex:[{n:'Bench press',d:'4×8'},{n:'DB shoulder press',d:'3×10'},{n:'Incline DB press',d:'3×10'}]},{label:'Pull',ex:[{n:'Pull-up / lat pulldown',d:'4×10'},{n:'Cable row',d:'4×12'},{n:'Face pull',d:'3×15'}]}]},
  {title:'Lower Strength',sections:[{label:'Squat',ex:[{n:'Barbell squat',d:'4×8'},{n:'Walking lunge',d:'3×20 steps'},{n:'Leg press',d:'3×15'}]},{label:'Hinge',ex:[{n:'Romanian deadlift',d:'4×10'},{n:'Leg curl',d:'3×12'},{n:'Calf raise',d:'4×20'}]}]},
  {title:'HIIT Circuit',sections:[{label:'Intervals',ex:[{n:'Burpees',d:'20 sec on/off × 10'},{n:'Jump squat',d:'30 sec on/off × 8'},{n:'Mountain climbers',d:'30 sec × 8'}]}]},
  {title:'Push Power',sections:[{label:'Strength',ex:[{n:'Barbell bench press',d:'5×5 heavy'},{n:'Overhead press',d:'4×8'},{n:'Tricep pushdown',d:'4×12'}]}]},
  {title:'Pull Power + Core',sections:[{label:'Pull',ex:[{n:'Weighted pull-up',d:'4×8'},{n:'Barbell row',d:'4×8'},{n:'Bicep curl',d:'3×12'}]},{label:'Core',ex:[{n:'Ab wheel rollout',d:'3×10'},{n:'Hanging knee raise',d:'3×15'},{n:'Plank',d:'3×45 sec'}]}]},
  {title:'Full Body Compound',sections:[{label:'Circuit — 4 rounds',ex:[{n:'Deadlift',d:'4×6 moderate-heavy'},{n:'Push-up',d:'4×15'},{n:'DB row',d:'4×12'},{n:'Goblet squat',d:'4×12'}]}]},
  {title:'Active Recovery + Stretch',sections:[{label:'Mobility',ex:[{n:'Yoga flow or foam roll',d:'20 min'},{n:'Hip flexor + hamstring stretch',d:'10 min'},{n:'Shoulder mobility',d:'10 min'}]}]},
];
const GYM_B=[
  {title:'Heavy Upper — Progressive Overload',sections:[{label:'Press',ex:[{n:'Barbell bench press',d:'5×5, +5 lb this week'},{n:'Overhead press',d:'4×8'},{n:'Cable fly',d:'3×12'}]},{label:'Pull',ex:[{n:'Weighted pull-up',d:'4×8'},{n:'Pendlay row',d:'4×8'},{n:'Hammer curl',d:'3×12'}]}]},
  {title:'Heavy Lower — Squat Focus',sections:[{label:'Main',ex:[{n:'Barbell back squat',d:'5×5 heavy'},{n:'Front squat / goblet squat',d:'3×10'},{n:'Bulgarian split squat',d:'3×10 each'}]},{label:'Accessory',ex:[{n:'Leg press',d:'3×15'},{n:'Leg curl',d:'3×12'},{n:'Calf raise',d:'5×20'}]}]},
  {title:'HIIT — High Intensity',sections:[{label:'Sprint Intervals',ex:[{n:'Treadmill sprint',d:'30 sec @ 9mph / 90 sec walk × 10'},{n:'Rowing sprint',d:'20 sec max / 40 sec rest × 10'},{n:'Assault bike',d:'10 sec max / 50 sec rest × 10'}]}]},
  {title:'Deadlift + Pull',sections:[{label:'Hinge',ex:[{n:'Conventional deadlift',d:'5×5 heavy'},{n:'Romanian deadlift',d:'3×10'},{n:'Good morning',d:'3×12'}]},{label:'Upper Pull',ex:[{n:'Lat pulldown',d:'4×10'},{n:'Cable row',d:'4×12'},{n:'Rear delt fly',d:'3×15'}]}]},
  {title:'Push Volume + Core',sections:[{label:'Push',ex:[{n:'DB chest press',d:'4×12 increase weight'},{n:'Incline bench',d:'3×10'},{n:'Lateral raise',d:'4×15'},{n:'Tricep extension',d:'4×12'}]},{label:'Core',ex:[{n:'Dragon flag / ab wheel',d:'4×8'},{n:'Weighted crunch',d:'3×15'},{n:'Pallof press',d:'3×12 each'}]}]},
  {title:'Full Body — Power',sections:[{label:'Power Circuit — 5 rounds',ex:[{n:'Power clean / clean pull',d:'5×3 moderate'},{n:'Box jump',d:'5×5'},{n:'Push press',d:'4×6'},{n:'Farmer carry',d:'4×30 sec heavy'}]}]},
  {title:'Strength Endurance',sections:[{label:'AMRAP 20 min',ex:[{n:'10 push-ups / 15 squats / 20 sit-ups',d:'As many rounds as possible'},{n:'Foam roll after',d:'15 min full body'}]}]},
];
const OUT_A=['45-min brisk walk — maintain elevated heart rate','45-min run/walk intervals (2 min walk / 1 min jog)','45-min outdoor jog at easy Zone 2 pace','45-min hike or trail walk with elevation','45-min bike ride outdoors, moderate resistance','45-min outdoor bodyweight circuit (park workout)','45-min power walk with hills or stairs'];
const OUT_B=['60-min outdoor run/walk — push the run portions','60-min hike or trail run, maximize elevation','45-min outdoor HIIT: sprint 100m / walk 100m × 15','60-min outdoor bike — high gear, high resistance','45-min outdoor stair climbs or hill repeats','60-min outdoor power walk at 4.0+ mph','45-min outdoor bodyweight: push-ups, squats, lunges, dips'];

const PHASE2A=[];
for(let i=0;i<30;i++){const day=16+i,gym=GYM_A[i%GYM_A.length];PHASE2A.push({day,title:gym.title,phase:'75 HARD — PHASE 2A',outdoor:true,outdoorDesc:OUT_A[i%OUT_A.length],sections:gym.sections});}
const PHASE2B=[];
for(let i=0;i<45;i++){const day=46+i,gym=GYM_B[i%GYM_B.length];PHASE2B.push({day,title:gym.title,phase:'75 HARD — PHASE 2B',outdoor:true,outdoorDesc:OUT_B[i%OUT_B.length],sections:gym.sections});}
const ALL_DAYS=[...PHASE1,...PHASE2A,...PHASE2B];
const HARD_ITEMS=[{key:'w1',label:'Workout 1 complete (45+ min gym)'},{key:'w2',label:'Workout 2 complete — OUTDOORS (45+ min)'},{key:'water',label:'1 gallon (128oz) of water consumed'},{key:'diet',label:'Diet followed — no cheats, no alcohol'},{key:'read',label:'10 pages of non-fiction read'},{key:'photo',label:'Daily progress photo taken'}];

function renderPhase(idx){
  currentPhaseTab=idx;
  const content=document.getElementById('phaseContent');
  content.innerHTML='';
  let days,weeks;
  if(idx===0){days=PHASE1;weeks=[{l:'Week 1 — Days 1–7',s:0,e:7},{l:'Week 2 — Days 8–15',s:7,e:15}];}
  else if(idx===1){days=PHASE2A;weeks=[{l:'Days 16–22',s:0,e:7},{l:'Days 23–29',s:7,e:14},{l:'Days 30–36',s:14,e:21},{l:'Days 37–45',s:21,e:30}];}
  else{days=PHASE2B;weeks=[{l:'Days 46–52',s:0,e:7},{l:'Days 53–59',s:7,e:14},{l:'Days 60–66',s:14,e:21},{l:'Days 67–73',s:21,e:28},{l:'Days 74–82',s:28,e:37},{l:'Days 83–90 — FINAL PUSH',s:37,e:45}];}
  weeks.forEach(w=>{
    const wh=document.createElement('div');wh.className='week-header';wh.textContent=w.l;content.appendChild(wh);
    days.slice(w.s,w.e).forEach(d=>{
      const gi=ALL_DAYS.findIndex(x=>x.day===d.day),done=!!completedDays[d.day];
      const row=document.createElement('div');row.className='day-row'+(done?' done':'');row.onclick=()=>openDay(gi);
      row.innerHTML=`<div class="check-col"><div class="check-circle">${done?'✓':''}</div></div><div class="day-info"><div class="day-num">DAY ${d.day}</div><div class="day-title">${d.title}</div><div class="day-sub">${d.phase}${d.outdoor?' · 🌿 OUTDOOR':''}</div></div><div class="arrow-col">›</div>`;
      content.appendChild(row);
    });
  });
}

function switchPhase(idx){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',+t.dataset.phase===idx));
  renderPhase(idx);
}

function openDay(gi){
  currentDayIndex=gi;
  const d=ALL_DAYS[gi],done=!!completedDays[d.day],isHard=d.day>=16;
  document.getElementById('detailDayNum').textContent='D'+d.day;
  document.getElementById('detailTitle').textContent=d.title;
  document.getElementById('detailPhase').textContent=d.phase;
  const scroll=document.getElementById('detailScroll');
  let html='';
  if(done) html+=`<div class="done-banner">✅ Day ${d.day} complete! Keep going.</div>`;
  if(isHard){
    const key='day_'+d.day,checks=hardChecks[key]||{};
    html+=`<div class="hard-checklist"><div class="hcl-title">75 Hard Daily Checklist</div>`;
    HARD_ITEMS.forEach(item=>{const chk=!!checks[item.key];html+=`<div class="hcl-item${chk?' checked':''}" onclick="toggleCheck(${d.day},'${item.key}',this)"><div class="hcl-box">${chk?'✓':''}</div><div class="hcl-text">${item.label}</div></div>`;});
    html+=`</div>`;
    if(d.outdoorDesc) html+=`<div class="section-block"><div class="section-label">🌿 Outdoor Workout (Workout 2)</div><div class="exercise-item"><span class="ex-name">${d.outdoorDesc}</span></div></div>`;
  } else {
    html+=`<div class="rules-block"><div class="rules-title">Phase 1 Guidelines</div><div class="rule-item">1 workout today, 45–60 minutes</div><div class="rule-item">Focus on form, not weight</div><div class="rule-item">Drink 80+ oz water today</div><div class="rule-item">Target 2,000–2,200 calories</div></div>`;
  }
  d.sections.forEach(s=>{
    html+=`<div class="section-block"><div class="section-label">${s.label}</div>`;
    (s.ex||[]).forEach(e=>{html+=`<div class="exercise-item"><span class="ex-name">${e.n}</span><span class="ex-detail">${e.d}</span></div>`;});
    html+=`</div>`;
  });
  const calText=buildCal(d);
  html+=`<button class="complete-btn${done?' done-state':''}" id="completeBtn" onclick="toggleComplete(${d.day})">${done?'✓ DAY COMPLETE':'✓ MARK DAY COMPLETE'}</button>`;
  html+=`<button class="copy-cal-btn" id="copyBtn" onclick="copyCal(this)">📋 Copy to Calendar</button>`;
  html+=`<div id="calData" style="display:none">${encodeURIComponent(calText)}</div>`;
  html+=`<div style="height:40px"></div>`;
  scroll.innerHTML=html;
  showScreen('detail',null);
}

function toggleCheck(day,key,el){
  const k='day_'+day;
  if(!hardChecks[k]) hardChecks[k]={};
  hardChecks[k][key]=!hardChecks[k][key];
  save();
  el.classList.toggle('checked',hardChecks[k][key]);
  el.querySelector('.hcl-box').textContent=hardChecks[k][key]?'✓':'';
  if(HARD_ITEMS.every(i=>hardChecks[k][i.key])&&!completedDays[day]){
    completedDays[day]=true;save();
    document.getElementById('completeBtn').textContent='✓ DAY COMPLETE';
    document.getElementById('completeBtn').classList.add('done-state');
    showToast('🔥 All tasks done — Day '+day+' complete!');
    updateProgress();
  }
}

function toggleComplete(day){
  completedDays[day]=!completedDays[day];save();
  const done=completedDays[day];
  const btn=document.getElementById('completeBtn');
  btn.textContent=done?'✓ DAY COMPLETE':'✓ MARK DAY COMPLETE';
  btn.classList.toggle('done-state',done);
  const scroll=document.getElementById('detailScroll');
  const existing=scroll.querySelector('.done-banner');
  if(done&&!existing) scroll.insertAdjacentHTML('afterbegin',`<div class="done-banner">✅ Day ${day} complete! Keep going.</div>`);
  else if(!done&&existing) existing.remove();
  if(done) showToast('🔥 Day '+day+' marked complete!');
  updateProgress();
}

function copyCal(btn){
  const raw=document.getElementById('calData').textContent;
  const text=decodeURIComponent(raw);
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ Copied!';btn.classList.add('copied');showToast('Copied! Paste into iOS Calendar.');setTimeout(()=>{btn.textContent='📋 Copy to Calendar';btn.classList.remove('copied');},2500);}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent='📋 Copy to Calendar';},2500);});
}

function buildCal(d){
  const isHard=d.day>=16;
  let t=`🔥 Day ${d.day} — ${d.title}\n📍 ${d.phase}\n\n`;
  if(isHard){t+=`75 HARD CHECKLIST:\n☐ Workout 1 (45+ min gym)\n☐ Workout 2 OUTDOORS (45+ min)\n☐ 1 gallon water\n☐ Diet — no cheats, no alcohol\n☐ 10 pages read\n☐ Progress photo\n\n`;if(d.outdoorDesc)t+=`🌿 OUTDOOR: ${d.outdoorDesc}\n\n`;}
  t+=`🏋️ GYM WORKOUT:\n`;
  d.sections.forEach(s=>{t+=`${s.label}:\n`;(s.ex||[]).forEach(e=>{t+=`• ${e.n}: ${e.d}\n`;});t+='\n';});
  if(!isHard) t+=`💧 Water: 80+ oz | 🥗 Calories: 2,000–2,200`;
  return t;
}

function updateProgress(){
  const done=Object.keys(completedDays).filter(k=>completedDays[k]).length;
  const pct=Math.round((done/90)*100);
  document.getElementById('doneCount').textContent=done+'/90';
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringCircle').style.strokeDashoffset=213.6-(pct/100)*213.6;
  let streak=0;for(let i=1;i<=90;i++){if(completedDays[i])streak++;else break;}
  document.getElementById('streakCount').textContent=streak+'🔥';
  document.getElementById('currentPhase').textContent=done<15?'RAMP':done<45?'75H-2A':'75H-2B';
  renderStats(done,streak,pct);
}

function renderStats(done,streak,pct){
  const sc=document.getElementById('statsContent');
  if(!sc) return;
  const lbs=(done*(40/90)).toFixed(1),target=(230-parseFloat(lbs)).toFixed(0);
  let html=`<div class="stat-card"><div class="stat-card-label">Days Completed</div><div class="stat-card-val">${done}</div><div class="stat-card-sub">${90-done} days remaining</div></div>`;
  html+=`<div class="stat-card"><div class="stat-card-label">Current Streak</div><div class="stat-card-val">${streak} 🔥</div><div class="stat-card-sub">Consecutive days from Day 1</div></div>`;
  html+=`<div class="stat-card"><div class="stat-card-label">Estimated Fat Lost</div><div class="stat-card-val">~${lbs} lbs</div><div class="stat-card-sub">~${target} lbs current weight (estimated)</div></div>`;
  html+=`<div class="stat-card"><div class="stat-card-label">Completion</div><div class="stat-card-val">${pct}%</div><div style="background:#2e2e2e;border-radius:4px;height:6px;margin-top:12px;overflow:hidden"><div style="background:#f5832a;height:6px;width:${pct}%;border-radius:4px"></div></div></div>`;
  html+=`<div class="stat-card"><div class="stat-card-label">90-Day Grid</div><div class="cal-grid" id="calGrid"></div></div>`;
  sc.innerHTML=html;
  const grid=document.getElementById('calGrid');
  for(let i=1;i<=90;i++){const c=document.createElement('div');c.className='cal-cell'+(completedDays[i]?' done':'');c.textContent=i;grid.appendChild(c);}
}

function showScreen(id,btn){
  if(id!=='detail') prevScreen=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='stats') updateProgress();
}

function goBack(){
  showScreen(prevScreen,null);
  renderPhase(currentPhaseTab);
  updateProgress();
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderPhase(0);
updateProgress();
</script>

</body>
</html>
